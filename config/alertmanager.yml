# Alertmanager Configuration for KrystalineX
# Routes alerts to GoAlert webhook + auto-remediation

global:
  resolve_timeout: 5m
  smtp_smarthost: 'maildev:1025'
  smtp_from: 'alertmanager@krystalinex.local'
  smtp_require_tls: false

# Alert routing tree
route:
  receiver: 'goalert-webhook'
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Auto-remediation — fires FIRST, continues to GoAlert for visibility
    - match:
        alertname: PriceFeedUnavailable
      receiver: 'auto-remediation'
      group_wait: 10s
      repeat_interval: 5m
      continue: true

    # Critical alerts - immediate notification (GoAlert + ntfy backup)
    - match:
        severity: critical
      receiver: 'goalert-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - match:
        severity: critical
      receiver: 'ntfy-critical'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts - batch notifications
    - match:
        severity: warning
      receiver: 'goalert-webhook'
      group_wait: 1m
      repeat_interval: 4h

    # Anomaly detector alerts — group by service for RCA correlation
    - match:
        source: anomaly-detector
      receiver: 'goalert-webhook'
      group_by: ['alertname', 'service']
      group_wait: 30s
      group_interval: 2m
      repeat_interval: 1h

    # Security alerts - immediate
    - match:
        service: security
      receiver: 'goalert-security'
      group_wait: 10s

# Inhibition rules
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: '.+'
    equal: ['service']

# Notification receivers
receivers:
  # Default GoAlert webhook (General)
  - name: 'goalert-webhook'
    webhook_configs:
      - url: 'http://goalert:8081/api/v2/prometheusalertmanager/incoming?token=99f40a5f-b3dc-43ae-8dc3-1ec0ea77ae14'
        send_resolved: true

  # Critical alerts - GoAlert + email
  - name: 'goalert-critical'
    webhook_configs:
      - url: 'http://goalert:8081/api/v2/prometheusalertmanager/incoming?token=8d5aa492-5110-48c8-ba7a-f751eaed9fb5'
        send_resolved: true
    email_configs:
      - to: 'carlos@krystaline.io'
        send_resolved: true
        headers:
          Subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }} - KrystalineX'

  # Security alerts - GoAlert Generic API
  - name: 'goalert-security'
    webhook_configs:
      - url: 'http://goalert:8081/api/v2/generic/incoming?token=2f5a2fa6-338b-41fe-9dee-e1197e3a0a4c'
        send_resolved: true

  # Auto-remediation — server webhook for self-healing actions
  - name: 'auto-remediation'
    webhook_configs:
      - url: 'http://host.docker.internal:5000/api/v1/monitor/webhook/remediation'
        send_resolved: true

  # ntfy mobile push (backup)
  - name: 'ntfy-mobile'
    webhook_configs:
      - url: 'https://ntfy.sh/${NTFY_TOPIC}'
        send_resolved: true

  # ntfy for critical alerts only
  - name: 'ntfy-critical'
    webhook_configs:
      - url: 'https://ntfy.sh/${NTFY_TOPIC}?priority=urgent&tags=rotating_light,critical&title=CRITICAL+Alert'
        send_resolved: true

templates:
  - '/etc/alertmanager/templates/*.tmpl'
