apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: krystalinex
  labels:
    app: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        args:
        - tunnel
        - --no-autoupdate
        - run
        - --token
        - eyJhIjoiMjk4ZDc5NDlkNGUyOTE4MDY2ZjhjNmNmZThmYWFlZTciLCJ0IjoiNmViZGVmZGQtZDY3MC00NmM2LWIxNDMtYzdhZjQyNjQyMDZjIiwicyI6Ik1HTmlNMlZsT0dJdFl6Z3paUzAwWkRoakxXSmxOak10T0RFek5UVmlabVZtT1dJNCJ9
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
