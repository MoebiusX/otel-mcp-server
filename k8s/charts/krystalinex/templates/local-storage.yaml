{{- if eq .Values.global.storageClass "local-storage" }}
# StorageClass for local volumes (bare-metal / on-prem)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-storage
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: WaitForFirstConsumer
---
# PV: PostgreSQL (10Gi)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ include "krystalinex.fullname" . }}-postgresql-pv
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  capacity:
    storage: {{ .Values.postgresql.primary.persistence.size }}
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/krystalinex/postgresql
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - kube
---
