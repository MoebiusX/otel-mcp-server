{{- if .Values.server.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krystalinex.fullname" . }}-server
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicaCount }}
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-for-postgresql
          image: postgres:16-alpine
          command: ['sh', '-c', 'until pg_isready -h {{ include "krystalinex.fullname" . }}-postgresql -p 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done; echo "PostgreSQL is ready!"']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -q -O /dev/null http://{{ include "krystalinex.fullname" . }}-rabbitmq:15672 2>/dev/null; do echo "Waiting for RabbitMQ..."; sleep 2; done; echo "RabbitMQ is ready!"']
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.service.port }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.server.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.server.env.PORT | quote }}
            # PostgreSQL connection (individual vars for config.ts)
            - name: DB_HOST
              value: "{{ include "krystalinex.fullname" . }}-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "crypto_exchange"
            - name: DB_USER
              value: "exchange"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: krystalinex-db-secrets
                  key: password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: krystalinex-secrets
                  key: database-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: krystalinex-secrets
                  key: rabbitmq-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: krystalinex-secrets
                  key: jwt-secret
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "krystalinex.fullname" . }}-otel-collector:4318"
            - name: JAEGER_URL
              value: "http://{{ include "krystalinex.fullname" . }}-jaeger.{{ .Release.Namespace }}.svc.cluster.local:16686/jaeger"
            - name: NODE_OPTIONS
              value: "--dns-result-order=ipv4first"
            - name: OLLAMA_URL
              value: "http://{{ include "krystalinex.fullname" . }}-ollama:11434"
            - name: PROMETHEUS_URL
              value: "http://{{ include "krystalinex.fullname" . }}-prometheus:9090/prometheus"
            - name: LOKI_URL
              value: "http://{{ include "krystalinex.fullname" . }}-loki:3100"
            - name: REDIS_URL
              value: "redis://{{ include "krystalinex.fullname" . }}-redis:6379"
            - name: OLLAMA_MODEL
              value: "XavierThibaudon/anomaly-analyzer"
            - name: RATE_LIMIT_GENERAL
              value: "10000"
            - name: RATE_LIMIT_AUTH
              value: "500"
            - name: RATE_LIMIT_SENSITIVE
              value: "200"
            {{- if .Values.secrets.mailgunApiKey }}
            - name: MAILGUN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: krystalinex-secrets
                  key: mailgun-api-key
            - name: MAILGUN_DOMAIN
              value: {{ .Values.server.env.MAILGUN_DOMAIN | default "mail.krystaline.io" | quote }}
            - name: MAILGUN_URL
              value: {{ .Values.server.env.MAILGUN_URL | default "https://api.eu.mailgun.net" | quote }}
            - name: EMAIL_FROM
              value: {{ .Values.server.env.EMAIL_FROM | default "\"Krystaline\" <no-reply@krystaline.io>" | quote }}
            {{- end }}
            {{- if .Values.bayesianService.enabled }}
            - name: BAYESIAN_SERVICE_URL
              value: "http://{{ include "krystalinex.fullname" . }}-bayesian-service:8100"
            - name: ENABLE_BAYESIAN_INFERENCE
              value: "true"
            {{- end }}
          {{- with .Values.server.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.server.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-server
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
{{- end }}
