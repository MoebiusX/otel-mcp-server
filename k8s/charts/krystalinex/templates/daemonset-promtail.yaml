{{- if .Values.promtail.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "krystalinex.fullname" . }}-promtail
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
spec:
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: promtail
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: promtail
    spec:
      serviceAccountName: {{ include "krystalinex.fullname" . }}-promtail
      containers:
        - name: promtail
          image: "{{ .Values.promtail.image.repository }}:{{ .Values.promtail.image.tag }}"
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - name: http-metrics
              containerPort: 9080
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: containers-logs
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /run/promtail
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.promtail.resources | nindent 12 }}
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: {{ include "krystalinex.fullname" . }}-promtail-config
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: containers-logs
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          hostPath:
            path: /run/promtail
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "krystalinex.fullname" . }}-promtail-config
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://{{ include "krystalinex.fullname" . }}-loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods in this namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: {{ .Release.Namespace }}
          # Extract pod name
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Extract container name
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Extract namespace
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Extract node name
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          # Extract component label
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            target_label: component
          # Set log file path
          - replacement: /var/log/pods/*$1/*.log
            separator: /
            source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
        pipeline_stages:
          # Try to parse JSON logs (Pino format from Node.js services)
          - json:
              expressions:
                level: level
                component: component
                msg: msg
                traceId: traceId
                spanId: spanId
          # Add extracted fields as labels
          - labels:
              level:
              component:
          # Keep traceId as structured metadata for Jaeger correlation
          - structured_metadata:
              traceId:
              spanId:
          # Fallback for non-JSON logs
          - match:
              selector: '{level=""}'
              stages:
                - static_labels:
                    level: unknown
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-promtail
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 9080
      targetPort: http-metrics
      name: http-metrics
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "krystalinex.fullname" . }}-promtail
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: promtail
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "krystalinex.fullname" . }}-promtail
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "krystalinex.fullname" . }}-promtail
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "krystalinex.fullname" . }}-promtail
subjects:
  - kind: ServiceAccount
    name: {{ include "krystalinex.fullname" . }}-promtail
    namespace: {{ .Release.Namespace }}
{{- end }}
