{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "krystalinex.fullname" . }}
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "frontend" }}
                name: {{ include "krystalinex.fullname" $ }}-frontend
                port:
                  number: 80
                {{- else if eq .service "server" }}
                {{- if $.Values.kong.enabled }}
                name: {{ include "krystalinex.fullname" $ }}-kong
                port:
                  number: 8000
                {{- else }}
                name: {{ include "krystalinex.fullname" $ }}-server
                port:
                  number: 5000
                {{- end }}
                {{- else if eq .service "grafana" }}
                name: {{ include "krystalinex.fullname" $ }}-grafana
                port:
                  number: 3000
                {{- else if eq .service "jaeger" }}
                name: {{ include "krystalinex.fullname" $ }}-jaeger
                port:
                  number: 16686
                {{- else if eq .service "prometheus" }}
                name: {{ include "krystalinex.fullname" $ }}-prometheus
                port:
                  number: 9090
                {{- else if eq .service "otel-collector" }}
                name: {{ include "krystalinex.fullname" $ }}-otel-collector
                port:
                  number: 4318
                {{- else if eq .service "alertmanager" }}
                name: {{ include "krystalinex.fullname" $ }}-alertmanager
                port:
                  number: 9093
                {{- else if eq .service "goalert" }}
                name: {{ include "krystalinex.fullname" $ }}-goalert
                port:
                  number: 8081
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.otelMcpServer.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "krystalinex.fullname" . }}-mcp
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /mcp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "krystalinex.fullname" $ }}-otel-mcp-server
                port:
                  number: 3001
    {{- end }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.goalert.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "krystalinex.fullname" . }}-goalert
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Authorization "";
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /goalert
            pathType: Prefix
            backend:
              service:
                name: {{ include "krystalinex.fullname" $ }}-goalert
                port:
                  number: 8081
    {{- end }}
{{- end }}
{{- if and .Values.ingress.enabled .Values.basicAuth.enabled .Values.ingress.protectedPaths }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "krystalinex.fullname" . }}-protected
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ include "krystalinex.fullname" . }}-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "KrystalineX Admin - Authentication Required"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range $.Values.ingress.protectedPaths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "grafana" }}
                name: {{ include "krystalinex.fullname" $ }}-grafana
                port:
                  number: 3000
                {{- else if eq .service "jaeger" }}
                name: {{ include "krystalinex.fullname" $ }}-jaeger
                port:
                  number: 16686
                {{- else if eq .service "prometheus" }}
                name: {{ include "krystalinex.fullname" $ }}-prometheus
                port:
                  number: 9090
                {{- else if eq .service "alertmanager" }}
                name: {{ include "krystalinex.fullname" $ }}-alertmanager
                port:
                  number: 9093
                {{- else if eq .service "goalert" }}
                name: {{ include "krystalinex.fullname" $ }}-goalert
                port:
                  number: 8081
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}

