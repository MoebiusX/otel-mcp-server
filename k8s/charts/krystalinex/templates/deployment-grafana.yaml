{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krystalinex.fullname" . }}-grafana
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: "{{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.secrets.grafanaAdminPassword | default "admin" | quote }}
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "traceqlEditor tempoSearch tempoBackendSearch publicDashboards"
            - name: GF_SMTP_ENABLED
              value: "true"
            - name: GF_SMTP_HOST
              value: "{{ include "krystalinex.fullname" . }}-maildev:1025"
            - name: GF_SMTP_SKIP_VERIFY
              value: "true"
            - name: GF_SMTP_FROM_ADDRESS
              value: "grafana@krystalinex.local"
            - name: GF_SMTP_FROM_NAME
              value: "KrystalineX Grafana"
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          volumeMounts:
            - name: datasource-provisioning
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboard-json
              mountPath: /etc/grafana/provisioning/dashboards/unified-observability.json
              subPath: unified-observability.json
            - name: k8s-dashboard-json
              mountPath: /etc/grafana/provisioning/dashboards/k8s-cluster.json
              subPath: k8s-cluster.json
          {{- if .Values.grafana.persistence.enabled }}
            - name: grafana-data
              mountPath: /var/lib/grafana
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasource-provisioning
          configMap:
            name: {{ include "krystalinex.fullname" . }}-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: {{ include "krystalinex.fullname" . }}-grafana-dashboards
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboard-json
          configMap:
            name: {{ include "krystalinex.fullname" . }}-grafana-dashboards
            items:
              - key: unified-observability.json
                path: unified-observability.json
        - name: k8s-dashboard-json
          configMap:
            name: {{ include "krystalinex.fullname" . }}-grafana-dashboards
            items:
              - key: k8s-cluster.json
                path: k8s-cluster.json
      {{- if .Values.grafana.persistence.enabled }}
        - name: grafana-data
          persistentVolumeClaim:
            claimName: {{ include "krystalinex.fullname" . }}-grafana
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-grafana
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  type: {{ .Values.grafana.service.type }}
  ports:
    - port: {{ .Values.grafana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
{{- if .Values.grafana.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "krystalinex.fullname" . }}-grafana
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: {{ .Values.grafana.persistence.size }}
{{- end }}
{{- end }}
