{{- if .Values.postgresExporter.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "krystalinex.fullname" . }}-postgres-exporter
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "krystalinex.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres-exporter
  template:
    metadata:
      labels:
        {{- include "krystalinex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: "{{ .Values.postgresExporter.image.repository }}:{{ .Values.postgresExporter.image.tag }}"
          env:
            - name: DATA_SOURCE_USER
              value: "exchange"
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: krystalinex-db-secrets
                  key: password
            - name: DATA_SOURCE_URI
              value: "{{ include "krystalinex.fullname" . }}-postgresql:5432/crypto_exchange?sslmode=disable"
          ports:
            - name: metrics
              containerPort: 9187
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgresExporter.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "krystalinex.fullname" . }}-postgres-exporter
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
spec:
  type: ClusterIP
  ports:
    - port: 9187
      targetPort: metrics
      name: metrics
  selector:
    {{- include "krystalinex.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-exporter
{{- end }}
