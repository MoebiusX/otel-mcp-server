# Secrets template - values injected via helm --set or values file
# For production, use sealed-secrets or external-secrets operator
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: krystalinex-secrets
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ printf "postgresql://exchange:%s@%s-postgresql:5432/crypto_exchange" (.Values.secrets.dbPassword | default "CHANGE_ME") (include "krystalinex.fullname" .) | quote }}
  rabbitmq-url: {{ printf "amqp://admin:%s@%s-rabbitmq:5672" (.Values.secrets.rabbitmqPassword | default "CHANGE_ME") (include "krystalinex.fullname" .) | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | default "CHANGE_ME_GENERATE_RANDOM_SECRET" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: krystalinex-db-secrets
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.dbPassword | default "CHANGE_ME" | quote }}
  password: {{ .Values.secrets.dbPassword | default "CHANGE_ME" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: krystalinex-kong-secrets
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.kongDbPassword | default (.Values.secrets.dbPassword | default "CHANGE_ME") | quote }}
  password: {{ .Values.secrets.kongDbPassword | default (.Values.secrets.dbPassword | default "CHANGE_ME") | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: krystalinex-rabbitmq-secrets
  labels:
    {{- include "krystalinex.labels" . | nindent 4 }}
type: Opaque
stringData:
  rabbitmq-password: {{ .Values.secrets.rabbitmqPassword | default "CHANGE_ME" | quote }}
{{- end }}
